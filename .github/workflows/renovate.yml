name: Renovate

on:
  schedule:
    - cron: "0 18 * * *" # 03:00 JST
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # RENOVATE_TOKEN (PAT) を使う。GITHUB_TOKEN だと push した commit が他ワークフロー
      # (test.yml)を発火できず(anti-recursion)、かつ PR 作成者が github-actions[bot]
      # になるため 2026-06 の GitHub 仕様変更で workflow 実行に人間の承認が必須になる
      # (リポジトリ側で無効化不可)。実アカウントの PAT を使えばどちらも回避できる。
      # renovate-version は renovatebot/github-action 自体のバージョン(v46.1.18)とは
      # 別採番(renovatebot/renovate 本体、Docker タグ)。ghcr.io/renovatebot/renovate に
      # 実在するタグを指定すること(独自の思い込みで action と同じ値を使わない)。
      - uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: "${{ secrets.RENOVATE_TOKEN }}"
          renovate-version: "43.272.4"
        env:
          RENOVATE_REPOSITORIES: "${{ github.repository }}"

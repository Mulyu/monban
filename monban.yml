exclude:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/fixtures/**"

path:
  forbidden:
    - path: "**/utils/**"
      message: "utils/ は使用禁止。適切なモジュールに配置してください。"
    - path: "**/helpers/**"
      message: "helpers/ は使用禁止。"
    - path: "src/**/*.js"
      message: "src/ 内に .js は配置できません。TypeScript を使用してください。"

  required:
    - path: "src/rules/*"
      files: ["index.ts"]

  naming:
    - path: "src/**/*.ts"
      style: kebab
    - path: "src/*/"
      target: directory
      style: kebab

  depth:
    - path: "src"
      max: 4

  count:
    - path: "src/rules/path"
      max: 10
    - path: "src/rules/content"
      max: 10
    - path: "src/rules/doc"
      max: 10

content:
  forbidden:
    - path: "src/**/*.ts"
      bom: true
      message: "BOM を含めないでください。"
    - path: "src/**/*.ts"
      invisible: true
      message: "不可視の Unicode 文字が含まれています。"
    - path: "src/**/*.ts"
      secret: true
      message: "シークレットらしき文字列が検出されました。"

doc:
  link:
    - path: "docs/**/*.md"
    - path: "*.md"

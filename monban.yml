# 共通の security baseline は Mulyu/okite から継承する。
# baseline の中身: secret / conflict / invisible / injection 検出、GitHub Actions ハードニング、
#                  npm サプライチェーン対策、MCP 設定検査、.gitignore 対象の誤コミット検出。
extends:
  - type: github
    repo: Mulyu/okite
    ref: main
    path: monban.yml

exclude:
  - "**/dist/**"
  - "**/fixtures/**"

path:
  forbidden:
    - path: "**/utils/**"
      message: "utils/ は使用禁止。適切なモジュールに配置してください。"
    - path: "**/helpers/**"
      message: "helpers/ は使用禁止。"
    - path: "src/**/*.js"
      message: "src/ 内に .js は配置できません。TypeScript を使用してください。"
    - path: "src/**/utils.ts"
      message: "utils.ts は曖昧な命名。具体的な責務を表すファイル名にしてください (例: manifest-loader.ts, workflow.ts)。"
    - path: "src/**/helpers.ts"
      message: "helpers.ts は曖昧な命名。具体的な責務を表すファイル名にしてください。"
    - path: "src/config/schema.ts"
      message: "schema.ts は schema/ ディレクトリと共存させず、schema/index.ts に統合してください。"
    - path: "src/registry/client.ts"
      message: "client.ts は registry/ ディレクトリと共存させず、registry/index.ts または責務別ファイル (ecosysteme.ts, offline.ts など) に分割してください。"
    # アンダースコア接頭辞は使用禁止。カテゴリ内ヘルパは internal/ サブディレクトリに配置する
    - path: "src/**/_*.ts"
      message: "アンダースコア接頭辞は使用禁止。カテゴリ内ヘルパは internal/ サブディレクトリに配置してください (例: src/rules/agent/internal/runner.ts)。"

  required:
    - path: "src/rules/*"
      files: ["index.ts"]
    - path: "src/config/schema/github"
      files: ["index.ts"]

    # 日英二言語ドキュメント方針: 英語版（拡張子なし）に対応する .ja.md が存在すること
    - path: "docs/*.md"
      exclude: ["docs/*.ja.md"]
      companions:
        - pattern: "{stem}.ja.md"
          required: true
    - path: "README.md"
      companions:
        - pattern: "README.ja.md"
          required: true

  naming:
    - path: "src/**/*.ts"
      style: kebab
    - path: "src/*/"
      target: directory
      style: kebab

  depth:
    - path: "src"
      max: 4

  count:
    - path: "src/rules/path"
      max: 12
    - path: "src/rules/content"
      max: 10
    - path: "src/rules/doc"
      max: 10
    - path: "src/rules/github"
      max: 18
    - path: "src/rules/git"
      max: 12

  # 大文字小文字違いで衝突するファイル名を検出
  case_conflict:
    - path: "**/*"
      severity: error

content:
  # 日英二言語ドキュメント方針: 各ファイル冒頭に言語セレクタヘッダーを置く
  required:
    - path: "docs/*.md"
      exclude: ["docs/*.ja.md"]
      pattern: '\*\*English\*\*'
      within_lines: 6
      message: "ドキュメンテーション方針: 英語版は冒頭に言語セレクタヘッダー（> [日本語](./xxx.ja.md) | **English**）を置く"
    - path: "docs/*.ja.md"
      pattern: '\*\*日本語\*\*'
      within_lines: 6
      message: "ドキュメンテーション方針: 日本語版は冒頭に言語セレクタヘッダー（> **日本語** | [English](./xxx.md)）を置く"
    - path: "README.md"
      pattern: '\*\*English\*\*'
      within_lines: 6
      message: "ドキュメンテーション方針: 英語 README は冒頭に言語セレクタヘッダーを置く"
    - path: "README.ja.md"
      pattern: '\*\*日本語\*\*'
      within_lines: 6
      message: "ドキュメンテーション方針: 日本語 README は冒頭に言語セレクタヘッダーを置く"

  forbidden:
    # baseline の content.forbidden（conflict/secret/invisible/injection）は okite から継承される。
    # ここには monban 固有の TypeScript 規約・命名規約のみ残す。
    - path: "src/**/*.ts"
      bom: true
      message: "BOM を含めないでください。"

    # injection ルール自身の説明を含むドキュメントは baseline では擬陽性になる。
    # 本リポ固有の例外として exclude 付きで再宣言する（baseline の汎用版と並走）。
    - path: "**/*.md"
      exclude:
        - "tests/fixtures/**"
        - "docs/content.md"
        - "docs/content.ja.md"
      injection: true
      message: "ドキュメントに不審な指示や不可視文字が含まれています。"

    - path: "src/rules/path/*.ts"
      pattern: '^export (async )?function check(?!Path)[A-Z]'
      message: "src/rules/path/ の check 関数は checkPath* と命名してください (例: checkPathRequired)。他カテゴリと一貫させる。"
    - path: "src/rules/content/*.ts"
      pattern: '^export (async )?function check(?!Content)[A-Z]'
      message: "src/rules/content/ の check 関数は checkContent* と命名してください。"
    - path: "src/rules/doc/*.ts"
      pattern: '^export (async )?function check(?!Doc)[A-Z]'
      message: "src/rules/doc/ の check 関数は checkDoc* と命名してください。"
    - path: "src/rules/github/*.ts"
      pattern: '^export (async )?function check(?!Github)[A-Z]'
      message: "src/rules/github/ の check 関数は checkGithub* と命名してください。"
    - path: "src/rules/deps/*.ts"
      pattern: '^export (async )?function check(?!Deps)[A-Z]'
      message: "src/rules/deps/ の check 関数は checkDeps* と命名してください。"
    - path: "src/rules/git/*.ts"
      pattern: '^export (async )?function check(?!Git)[A-Z]'
      message: "src/rules/git/ の check 関数は checkGit* と命名してください。"
    - path: "src/rules/runtime/*.ts"
      pattern: '^export (async )?function check(?!Runtime)[A-Z]'
      message: "src/rules/runtime/ の check 関数は checkRuntime* と命名してください。"

    # --- デバッグ残渣 / 型安全 ---
    - path: "src/**/*.ts"
      pattern: '\bdebugger\b'
      message: "debugger を残さないでください。"
    - path: "src/**/*.ts"
      exclude:
        - "src/bin.ts"
        - "src/cli.ts"
        - "src/orchestrator.ts"
        - "src/reporter.ts"
      pattern: 'console\.(log|error|warn)'
      message: "console 出力は bin/CLI/orchestrator/reporter に限定してください。"
    - path: "src/**/*.ts"
      pattern: '@ts-(ignore|nocheck)'
      message: "@ts-ignore / @ts-nocheck は禁止。@ts-expect-error + 理由コメントを使ってください。"

# baseline で monban CLI の test.yml を必須にしているわけではないので、
# monban 固有の required ジョブ定義はここで宣言する。
github:
  actions:
    required:
      - file: ".github/workflows/test.yml"
      - path: ".github/workflows/test.yml"
        steps: ["actions/checkout", "actions/setup-node"]
    # baseline は GITHUB_TOKEN のみ。NPM_TOKEN を concat で追加（リリース用）
    secrets:
      - path: ".github/workflows/**/*.yml"
        allowed: ["NPM_TOKEN"]

# baseline は heuristic 系を warn にしているが、本リポではリリース対象 CLI なので error で運用する。
deps:
  freshness:
    - path: "package.json"
      max_age_hours: 72
      severity: error
  popularity:
    - path: "package.json"
      min_downloads: 1000
      severity: error
  floating_version:
    - path: "package.json"
      severity: error
      exclude:
        - "tests/fixtures/**"

# コミット品質
git:
  commit:
    message:
      preset: conventional
      subject_max_length: 72
      forbidden_subjects: ["fix", "update", "wip", "misc", "changes"]
      ignore_merges: true
      ignore_reverts: true
  diff:
    # 巨大 PR を警告（レビュー可能性の担保）
    size:
      max_total_lines: 1500
      exclude:
        - "package-lock.json"
        - "**/__snapshots__/**"
        - "**/*.lock"
        - "**/*.ja.md"   # 英語原文のミラー翻訳。レビュー負荷の指標にカウントしない
      severity: error

  # ブランチ命名規約（main / claude/* / feat/* / fix/* / chore/* / docs/*）
  branch_name:
    pattern: "^(claude|feat|fix|chore|docs|refactor|test|ci|build)/[A-Za-z0-9._/-]+$"
    allowed: ["main"]
    severity: error

  # SemVer 形式のタグのみ許容
  tag_name:
    pattern: "^v\\d+\\.\\d+\\.\\d+(-[a-z0-9.]+)?$"
    severity: error

doc:
  ref:
    - path: "docs/**/*.md"
    - path: "plugins/**/*.md"
  link:
    - path: "docs/**/*.md"
    - path: "*.md"

# ランタイムバージョン指定の複数ファイル整合
runtime:
  consistency:
    - preset: node
